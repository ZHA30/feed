name: Build Feed

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

concurrency:
  group: feed-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Pin source branch
        run: git fetch --depth=1 origin main:refs/remotes/origin/main && git checkout -B main origin/main
      - name: Prepare state worktree
        run: |
          if git ls-remote --exit-code --heads origin state >/dev/null 2>&1; then
            git fetch --depth=1 origin state:refs/remotes/origin/state
            git worktree add --detach state origin/state
          else
            git worktree add --orphan state
          fi
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build feed outputs
        run: npm run feed:build
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          FEED_STATE_DIR: state
          FEED_SECRET_ENV: ${{ secrets.FEED_SECRET_ENV }}
          WEB_TRANSLATE_FALLBACK: "1"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Update state README
        run: npm run feed:update-readme
        env:
          FEED_STATE_DIR: state
          FEED_PAGE_URL: ${{ steps.deployment.outputs.page_url }}
      - name: Commit state
        run: npm run feed:commit-state
        env:
          FEED_STATE_DIR: state
